<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aplikasi Timbangan Panen</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family: Courier New;
background:#f1f3f6;
margin:0;
padding:15px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.form-group{
display:flex;
flex-direction:column;
}

.form-group label{
font-size:18px;
font-weight:bold;
margin-bottom:4px;
}

input{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:20px;
}

.full{
grid-column:1/3;
}

button{
padding:12px;
border:none;
background:#2c7be5;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
width:100%;
height:45px;
}

.button-group{
display:flex;
gap:10px;
}

.button-group button{
flex:1;
}

.clear-btn{
background:#e74c3c;
}

.print-btn{
background:#27ae60;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
font-size:20px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
}

th{
background:#f0f0f0;
}

.subtotal{
background:#dff0d8;
font-weight:bold;
}

.result{
margin-top:20px;
font-size:20px;
line-height:1.6;
}

.totalbayar{
font-size:20px;
font-weight:bold;
}

/* #nota{
margin-top:30px;
padding:15px;
border:1px dashed #999;
background:white;

font-size:10px;
line-height:1.5;
}

#nota table{
font-size:10px;
border-collapse:collapse;
}

#hasilNota{
font-size:18px;
font-weight:bold; 
}  

#nota th,
#nota td{
padding:2px 4px;
} 

#nota h3{
font-size:30px;
margin-bottom:1px;
font-weight:bold;
}
  
#info{
font-size:20px;
margin-bottom:1px;
font-weight:bold;
}  */

#nota{
font-family:Courier New;
margin-top:30px;
padding:15px;
border:1px dashed #999;
background:#ffffff;
visibility:hidden;
/*font-size:16px;*/
line-height:1.5;
}

.judul-nota{
text-align:center;
margin:2px 0;
font-size:18px;
}

.garis{
border-top:2px solid #000;
border-bottom:1px solid #000;
height:3px;
margin:2px 0 4px 0;
}

#info{
font-size:12px;
font-weight: bold;
margin-bottom:1px;
line-height:1.2;
}

#nota table{
/*width:100%;*/
border-collapse:collapse;
margin-top:-8px;
}

#nota th{
border:1px solid #000;
padding:2px;
font-size:8px;
font-weight: normal;
background:#ffffff;
}

#nota td{
border:1px solid #000;
padding:2px;
/*font-size:10px;*/
}

#hasilNota{
font-size:12px;
margin-top:9px;
font-weight:bold;
line-height:1.3;
}

#tanggal{
text-align:center;
font-size:11px;
margin-top:-5px;
margin-bottom:1px;
} 

.berat-satuan{
font-size:5px;
margin-left:1px;
}

  
  
@media(max-width:480px){

.form-grid{
grid-template-columns:1fr;
}

.full{
grid-column:auto;
}

.button-group{
flex-direction:column;
}

}

</style>
</head>

<body>

<div class="container">

<h2>Aplikasi Timbangan Panen</h2>

<div class="form-grid">

<div class="form-group">
<label>Petani</label>
<input type="text" id="penjual">
</div>

<div class="form-group">
<label>Pedagang</label>
<input type="text" id="pembeli">
</div>

<div class="form-group">
<label>Harga per Kg</label>
<input type="number" id="harga">
</div>

<div class="form-group">
<label>Potongan (%)</label>
<input type="number" id="potongan">
</div>

<div class="form-group full">
<label>Masukkan Berat</label>
<input type="number" id="berat">
</div>

<div class="button-group full">

<button onclick="tambah()">Tambah Timbangan</button>

<button onclick="location.reload()" class="clear-btn">Clear</button>

<button onclick="cetakData()" class="print-btn">Cetak Nota</button>

</div>

</div>


<table>

<thead>
<tr>
<th>No</th>
<th>Berat</th>
</tr>
</thead>

<tbody id="tabel"></tbody>

</table>

<!--
<div class="result" id="hasil"></div>
-->

</div>


<!-- NOTA -->

<div id="nota">

<h3 class="judul-nota">NOTA TIMBANGAN</h3>
<div id="tanggal"></div>
<div class="garis"></div>
<div id="info"></div>
<table id="tabelNota"></table>
<div id="hasilNota"></div>

</div>

<div id="nota">
<h3 style="text-align:center" >Nota</h3>
<div id="info"></div>

<script>

let data=[];

document.getElementById("berat").addEventListener("keypress",function(e){

if(e.key==="Enter") tambah();

});

function tambah(){

let b=document.getElementById("berat").value;

if(!b) return;

data.push(Math.floor(b));

document.getElementById("berat").value="";
document.getElementById("berat").focus();

render();

}

function render(){

let tbody=document.getElementById("tabel");

tbody.innerHTML="";

let subtotal=0;
let start=1;

for(let i=0;i<data.length;i++){

let tr=document.createElement("tr");

tr.innerHTML="<td>"+(i+1)+"</td><td>"+data[i]+" kg</td>";

tbody.appendChild(tr);

subtotal+=data[i];

if((i+1)%5==0){

let trSub=document.createElement("tr");

trSub.className="subtotal";

trSub.innerHTML="<td>Subtotal "+start+"-"+(i+1)+"</td><td>"+subtotal+" kg</td>";

tbody.appendChild(trSub);

subtotal=0;

start=i+2;

}

}

if(data.length%5!=0){

let trSub=document.createElement("tr");

trSub.className="subtotal";

trSub.innerHTML="<td>Subtotal "+start+"-"+data.length+"</td><td>"+subtotal+" kg</td>";

tbody.appendChild(trSub);

}

hitung();

}

function hitung(){

let total=0;

data.forEach(v=>total+=v);

let pot=document.getElementById("potongan").value || 0;
let harga=document.getElementById("harga").value || 0;

let potAsli = total*(pot/100);
let potKg = Math.floor(potAsli);

let bersih = Math.floor(total - potAsli);

let bayar = Math.floor(bersih * harga);

let zakat = Math.floor(bayar * 0.025);

document.getElementById("hasil").innerHTML=

"Berat Kotor : "+total+" Kg<br>"+
"Potongan : "+potKg+" Kg<br>"+
"Berat bersih : "+bersih+" Kg<br>"+
"<span class='totalbayar'>Total Bayar : Rp "+bayar.toLocaleString()+"</span><br><br>"+
"<b>Total Keluar Zakat : Rp "+zakat.toLocaleString()+"</b>";

}

function cetakData(){

let penjual=document.getElementById("penjual").value;
let pembeli=document.getElementById("pembeli").value;

let tabelNota=document.getElementById("tabelNota");
tabelNota.innerHTML="";

/* HEADER */

let header=document.createElement("tr");
let h="";
for(let i=0;i<5;i++){
h+="<th>No</th><th>Kg</th>";
}
h+="<th>Total</th>";
header.innerHTML=h;
tabelNota.appendChild(header);

/* DATA */

let subtotal=0;
let hitung=0;
let tr=document.createElement("tr");
let isi="";

for(let i=0;i<data.length;i++){

subtotal += data[i];
hitung++;

isi += "<td style=';font-size:8px;'>"+(i+1)+"</td><td style='font-weight:bold;font-size:9px;'>"+data[i]+"span class='berat-satuan'>kg</span></td></td>";

if(hitung==5){

isi += "<td style='font-weight:bold;font-size:9px;background:#f2f2f2'>"+subtotal+"span class='berat-satuan'>kg</span></td></td>";

tr.innerHTML=isi;
tabelNota.appendChild(tr);

tr=document.createElement("tr");
isi="";
subtotal=0;
hitung=0;

}

}

/* jika sisa timbangan kurang dari 5 */

if(hitung>0){

for(let i=hitung;i<5;i++){
isi += "<td></td><td></td>";
}

isi += "<td style='font-weight:bold;font-size:9px;background:#f2f2f2'>"+subtotal+"span class='berat-satuan'>kg</span></td></td>";

tr.innerHTML=isi;
tabelNota.appendChild(tr);

}

/* TOTAL */

let total=0;
data.forEach(v=>total+=v);

let pot=document.getElementById("potongan").value || 0;
let harga=document.getElementById("harga").value || 0;

let potAsli = total*(pot/100);
let potKg = Math.floor(potAsli);
let bersih = Math.floor(total - potAsli);
let bayar = Math.floor(bersih * harga);
let zakat = Math.floor(bayar * 0.025);

  /* TANGGAL DAN JAM */

let now = new Date();

let tgl = now.toLocaleDateString("id-ID",{
day:"2-digit",
month:"long",
year:"numeric"
});

let jam = now.toLocaleTimeString("id-ID",{
hour:"2-digit",
minute:"2-digit"
});

document.getElementById("tanggal").innerHTML =
tgl+" - "+jam;

document.getElementById("info").innerHTML=

"<b>Petani :</b> "+penjual+"<br>"+
"<b>Pedagang :</b> "+pembeli+"<br><br>";

document.getElementById("hasilNota").innerHTML=

"Berat Kotor : "+total+" Kg<br>"+
"Potongan : "+potKg+" Kg<br>"+
"Berat Bersih : "+bersih+" Kg<br>";
  /*
"<b>Total Bayar : Rp "+bayar.toLocaleString()+"</b><br>"+
"Zakat 2.5% : Rp "+zakat.toLocaleString(); */

/* DOWNLOAD NOTA */

let nota=document.getElementById("nota");

nota.style.visibility="visible";

html2canvas(nota,{
scale:7
}).then(function(canvas){

let link=document.createElement("a");
link.download="nota_timbangan.png";
link.href=canvas.toDataURL("image/png");
link.click();

nota.style.visibility="hidden";

});

}
  
</script>

</body>
</html>
