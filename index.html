<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aplikasi Timbangan Panen</title>

<style>

body{
font-family: Arial;
background:#f1f3f6;
margin:0;
padding:15px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

/* form layout */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.form-group{
display:flex;
flex-direction:column;
}

.form-group label{
font-size:14px;
margin-bottom:4px;
}

input{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

.full{
grid-column:1/3;
}

button{
padding:12px;
border:none;
background:#2c7be5;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1a68d1;
}

/* tabel */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
font-size:15px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#f0f0f0;
}

.subtotal{
background:#dff0d8;
font-weight:bold;
}

/* hasil */

.result{
margin-top:20px;
font-size:15px;
line-height:1.6;
}

.totalbayar{
font-size:18px;
font-weight:bold;
}


.button-group{
display:flex;
gap:10px;
}

.clear-btn{
background:#e74c3c;
}

.clear-btn:hover{
background:#c0392b;
}  

.print-btn{
background:#27ae60;
}

.print-btn:hover{
background:#1e8449;
}  

/* responsive kecil */

@media(max-width:480px){

.form-grid{
grid-template-columns:1fr;
}

.full{
grid-column:auto;
}

}

</style>
</head>

<body>

<div class="container">

<h2>Aplikasi Timbangan Panen</h2>

<div class="form-grid">

<div class="form-group">
<label>Nama Penjual</label>
<input type="text" id="penjual">
</div>

<div class="form-group">
<label>Nama Pembeli</label>
<input type="text" id="pembeli">
</div>
  

<div class="form-group">
<label>Harga per Kg</label>
<input type="number" id="harga">
</div>

<div class="form-group">
<label>Potongan (%)</label>
<input type="number" id="potongan">
</div>

<div class="form-group full">
<label>Masukkan berat</label>
<input type="number" id="berat">
</div>

<div class="button-group full">

<button onclick="tambah()">Tambah Timbangan</button>

<button onclick="clearData()" class="clear-btn">Clear</button>

<button onclick="cetakNota()" class="print-btn">Cetak Nota</button>  

</div>

<table>
<thead>
<tr>
<th>No</th>
<th>Berat</th>
</tr>
</thead>

<tbody id="tabel"></tbody>

</table>

<div class="result" id="hasil"></div>

</div>

<div id="nota">

<h3 style="text-align:center">NOTA TIMBANGAN BAWANG</h3>

<p>
Penjual : <span id="notaPenjual"></span><br>
Pembeli : <span id="notaPembeli"></span>
</p>

<table>
<thead>
<tr>
<th>No</th>
<th>Berat</th>
</tr>
</thead>

<tbody id="tabel"></tbody>

</table>

<div class="result" id="hasil"></div>

</div>  

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>  

<script>

let data=[];

document.getElementById("berat").addEventListener("keypress",function(e){
if(e.key==="Enter") tambah();
});

function tambah(){

let b=document.getElementById("berat").value;

if(!b)return;

data.push(Math.floor(b));

document.getElementById("berat").value="";
document.getElementById("berat").focus();

render();

}

function render(){

let tbody=document.getElementById("tabel");

tbody.innerHTML="";

let subtotal=0;
let start=1;

for(let i=0;i<data.length;i++){

let tr=document.createElement("tr");

tr.innerHTML="<td>"+(i+1)+"</td><td>"+data[i]+"</td>";

tbody.appendChild(tr);

subtotal+=data[i];

if((i+1)%5==0){

let trSub=document.createElement("tr");

trSub.className="subtotal";

trSub.innerHTML="<td>Subtotal "+start+"-"+(i+1)+"</td><td>"+subtotal+" kg</td>";

tbody.appendChild(trSub);

subtotal=0;

start=i+2;

}

}

if(data.length%5!=0){

let trSub=document.createElement("tr");

trSub.className="subtotal";

trSub.innerHTML="<td>Subtotal "+start+"-"+data.length+"</td><td>"+subtotal+" kg</td>";

tbody.appendChild(trSub);

}

hitung();

}

function hitung(){

let total=0;

data.forEach(v=>total+=v);

let pot=document.getElementById("potongan").value || 0;
let harga=document.getElementById("harga").value || 0;

let potAsli = total*(pot/100);
let potKg = Math.floor(potAsli);

let bersih = Math.floor(total - potAsli);

let bayar = Math.floor(bersih * harga);

/* hitung zakat 2.5% */
let zakat = Math.floor(bayar * 0.025);

document.getElementById("notaPenjual").innerText =
document.getElementById("penjual").value;

document.getElementById("notaPembeli").innerText =
document.getElementById("pembeli").value;  


document.getElementById("hasil").innerHTML=

"Total berat : "+total+" kg<br>"+
"Potongan : "+potKg+" kg<br>"+
"Berat bersih : "+bersih+" kg<br>"+
"<span class='totalbayar'>Total Bayar : Rp "+bayar.toLocaleString()+"</span><br><br>"+
"<b>Total Keluar Zakat : Rp "+zakat.toLocaleString()+"</b>";


}

function clearData(){

data=[];

document.getElementById("tabel").innerHTML="";
document.getElementById("hasil").innerHTML="";

document.getElementById("berat").value="";
document.getElementById("berat").focus();

}                            
  
</script>

<script>

function cetakNota(){

let penjual=document.getElementById("penjual").value;
let pembeli=document.getElementById("pembeli").value;

document.getElementById("notaPenjual").innerText=penjual;
document.getElementById("notaPembeli").innerText=pembeli;

let area=document.getElementById("nota");

html2canvas(area).then(function(canvas){

let link=document.createElement("a");

link.download="nota-timbangan-bawang.png";

link.href=canvas.toDataURL("image/png");

link.click();

});

}

</script>  
  

</body>
</html>
