<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aplikasi Timbangan Panen</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family: Arial;
background:#f1f3f6;
margin:0;
padding:15px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

/* FORM */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.form-group{
display:flex;
flex-direction:column;
}

.form-group label{
font-size:14px;
margin-bottom:4px;
}

input{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

.full{
grid-column:1/3;
}

/* TOMBOL */

button{
padding:12px;
border:none;
background:#2c7be5;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
width:100%;
height:45px;
box-sizing:border-box;
}

button:hover{
background:#1a68d1;
}

.button-group{
display:flex;
gap:10px;
width:100%;
}

.button-group button{
flex:1;
}

.clear-btn{
background:#e74c3c;
}

.clear-btn:hover{
background:#c0392b;
}

.print-btn{
background:#27ae60;
}

.print-btn:hover{
background:#1e8449;
}

/* TABEL */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
font-size:15px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#f0f0f0;
}

.subtotal{
background:#dff0d8;
font-weight:bold;
}

/* HASIL */

.result{
margin-top:20px;
font-size:15px;
line-height:1.6;
}

.totalbayar{
font-size:18px;
font-weight:bold;
}

/* NOTA */

#nota{
margin-top:30px;
padding:15px;
border:1px dashed #999;
background:white;

/* disembunyikan dari layar */
opacity:0;
position:absolute;
left:-9999px;
}

/* RESPONSIVE HP */

@media(max-width:480px){

.form-grid{
grid-template-columns:1fr;
}

.full{
grid-column:auto;
}

.button-group{
flex-direction:column;
}

button{
height:50px;
font-size:17px;
}

}

</style>
</head>

<body>

<div class="container">

<h2>Aplikasi Timbangan Panen</h2>

<div class="form-grid">

<div class="form-group">
<label>Nama Penjual</label>
<input type="text" id="penjual">
</div>

<div class="form-group">
<label>Nama Pembeli</label>
<input type="text" id="pembeli">
</div>

<div class="form-group">
<label>Harga per Kg</label>
<input type="number" id="harga">
</div>

<div class="form-group">
<label>Potongan (%)</label>
<input type="number" id="potongan">
</div>

<div class="form-group full">
<label>Masukkan Berat</label>
<input type="number" id="berat">
</div>

<div class="button-group full">

<button onclick="tambah()">Tambah Timbangan</button>

<button onclick="location.reload()" class="clear-btn">Clear</button>
  

<button onclick="cetakData()" class="print-btn">Cetak Nota</button>

</div>

</div>


<table>

<thead>
<tr>
<th>No</th>
<th>Berat</th>
</tr>
</thead>

<tbody id="tabel"></tbody>

</table>


<div class="result" id="hasil"></div>


<!-- NOTA CETAK -->

<div id="nota">

<h3 style="text-align:center">NOTA TIMBANGAN</h3>

<div id="info"></div>

<table>

<thead>
<tr>
<th>No</th>
<th>Berat</th>
</tr>
</thead>

<tbody id="tabelNota"></tbody>

</table>

<div class="result" id="hasilNota"></div>

</div>

</div>


<script>

let data=[];

document.getElementById("berat").addEventListener("keypress",function(e){

if(e.key==="Enter") tambah();

});

function tambah(){

let b=document.getElementById("berat").value;

if(!b) return;

data.push(Math.floor(b));

document.getElementById("berat").value="";
document.getElementById("berat").focus();

render();

}

function render(){

let tbody=document.getElementById("tabel");

tbody.innerHTML="";

let subtotal=0;
let start=1;

for(let i=0;i<data.length;i++){

let tr=document.createElement("tr");

tr.innerHTML="<td>"+(i+1)+"</td><td>"+data[i]+" kg</td>";

tbody.appendChild(tr);

subtotal+=data[i];

if((i+1)%5==0){

let trSub=document.createElement("tr");

trSub.className="subtotal";

trSub.innerHTML="<td>Subtotal "+start+"-"+(i+1)+"</td><td>"+subtotal+" kg</td>";

tbody.appendChild(trSub);

subtotal=0;

start=i+2;

}

}

if(data.length%5!=0){

let trSub=document.createElement("tr");

trSub.className="subtotal";

trSub.innerHTML="<td>Subtotal "+start+"-"+data.length+"</td><td>"+subtotal+" kg</td>";

tbody.appendChild(trSub);

}

hitung();

}

function hitung(){

let total=0;

data.forEach(v=>total+=v);

let pot=document.getElementById("potongan").value || 0;
let harga=document.getElementById("harga").value || 0;

let potAsli = total*(pot/100);
let potKg = Math.floor(potAsli);

let bersih = Math.floor(total - potAsli);

let bayar = Math.floor(bersih * harga);

let zakat = Math.floor(bayar * 0.025);

document.getElementById("hasil").innerHTML=

"Total berat : "+total+" kg<br>"+
"Potongan : "+potKg+" kg<br>"+
"Berat bersih : "+bersih+" kg<br>"+
"<span class='totalbayar'>Total Bayar : Rp "+bayar.toLocaleString()+"</span><br><br>"+
"<b>Total Keluar Zakat : Rp "+zakat.toLocaleString()+"</b>";

}


function cetakData(){

let penjual=document.getElementById("penjual").value;
let pembeli=document.getElementById("pembeli").value;

let tabelNota=document.getElementById("tabelNota");

tabelNota.innerHTML="";

for(let i=0;i<data.length;i++){

let tr=document.createElement("tr");

tr.innerHTML="<td>"+(i+1)+"</td><td>"+data[i]+" kg</td>";

tabelNota.appendChild(tr);

}

let total=0;
data.forEach(v=>total+=v);

let pot=document.getElementById("potongan").value || 0;
let harga=document.getElementById("harga").value || 0;

let potAsli = total*(pot/100);
let potKg = Math.floor(potAsli);
let bersih = Math.floor(total - potAsli);
let bayar = Math.floor(bersih * harga);
let zakat = Math.floor(bayar * 0.025);

document.getElementById("info").innerHTML=

"<b>Penjual :</b> "+penjual+"<br>"+
"<b>Pembeli :</b> "+pembeli+"<br><br>";

document.getElementById("hasilNota").innerHTML=

"Total berat : "+total+" kg<br>"+
"Potongan : "+potKg+" kg<br>"+
"Berat bersih : "+bersih+" kg<br>"+
"<b>Total Bayar : Rp "+bayar.toLocaleString()+"</b><br>"+
"Zakat 2.5% : Rp "+zakat.toLocaleString();


html2canvas(document.getElementById("nota")).then(function(canvas){

let link=document.createElement("a");

link.download="nota_timbangan.png";

link.href=canvas.toDataURL("image/png");

link.click();

});
}

</script>

</body>
</html>
